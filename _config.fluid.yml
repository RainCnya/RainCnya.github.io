#---------------------------
# Hexo Theme Fluid
# Configured by: Qu Xi & Anya (v7.0 Purple Rain Edition)
#---------------------------

#---------------------------
# 全局 (Global)
#---------------------------

# 浏览器标签图标
favicon: /img/Rain.png
apple_touch_icon: /img/Rain.png
tab_title_separator: " - "
force_https: false

# 代码块增强 (Mac 风格 + Atom Dark)
code:
  copy_btn: true
  language:
    enable: true
    default: "cpp"
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: 'atom-one-dark'
      style_dark: 'atom-one-dark'
    prismjs:
      style: "default"
      style_dark: "tomorrow night"
      preprocess: true
    # 开启 Mac 风格圆点
    mac3d: true

# 有趣的功能 (打字机)
fun_features:
  typing:
    enable: true
    typeSpeed: 70
    cursorChar: "_"
    loop: false
    scope: []
  anchorjs:
    enable: true
    element: h1,h2,h3,h4,h5,h6
    placement: left
    visible: hover
    icon: ""
  progressbar:
    enable: true
    height_px: 3
    color: "#7E57C2" # 紫色进度条
    options: { showSpinner: false, trickleSpeed: 100 }

# 暗色模式
dark_mode:
  enable: true
  default: auto

# -----------------------------------------------------------------
# 注入外部资源 (字体 CSS)
# -----------------------------------------------------------------
head:
  html: |
    <link rel="stylesheet" href="https://npm.elemecdn.com/lxgw-wenkai-screen-webfont/style.css" media="print" onload="this.media='all'">

# -----------------------------------------------------------------
# 视觉与色彩 (Purple Rain) (鸢尾花与雨)
# -----------------------------------------------------------------
color:
  body_bg_color: "#F7F7F9"
  body_bg_color_dark: "#1A1B26"
  navbar_bg_color: "#4A4E69"
  navbar_bg_color_dark: "#24283B"
  navbar_text_color: "#F2E9E4"
  navbar_text_color_dark: "#C0CAF5"
  subtitle_color: "#FFFFFF"
  subtitle_color_dark: "#C0CAF5"
  text_color: "#22223B"
  text_color_dark: "#A9B1D6"
  board_color: "#FFFFFF"
  board_color_dark: "#1F2335"
  post_text_color: "#22223B"
  post_text_color_dark: "#C0CAF5"
  
  # 核心点缀: 紫色
  post_link_color: "#7E57C2" 
  post_link_color_dark: "#BB9AF7"
  link_hover_color: "#673AB7"
  link_hover_color_dark: "#9D7CD8"
  link_hover_bg_color: "#F3E5F5"
  link_hover_bg_color_dark: "#292E42"

# 字体配置 (霞鹜文楷)
font:
  font_size: 16px
  font_family: '"LXGW WenKai Screen", "Microsoft YaHei", sans-serif'
  code_font_size: 85%

custom_js:

custom_css:
  - /css/custom.css
  - /css/banner.css
  - /css/article_v1.css
  - /css/callout.css
  - /css/home.css

web_analytics:
  enable: true
  follow_dnt: true
  leancloud:
    app_id: azOfRMg6j8kDZzcjUS25FXKW-gzGzoHsz
    app_key: pvy1eRs2A9HXC5kAIQrRh0Eo 
    server_url: https://azofrmg6.lc-cn-n1-shared.com
    path: window.location.pathname
    ignore_local: true

canonical:
  enable: true

lazyload:
  enable: true
  loading_img: /img/loading.gif
  onlypost: false
  offset_factor: 2

iconfont: //at.alicdn.com/t/c/font_1736178_k526ubmyhba.css

#---------------------------
# 页头
#---------------------------
navbar:
  blog_title: "MiQiu"
  ground_glass:
    enable: false # 我们在 custom.css 里手动实现了更高级的毛玻璃，这里关掉防止冲突
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "works", name: "作品", link: "/works/", icon: "iconfont icon-books" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill" }
    - { key: "links", link: "/links/", icon: "iconfont icon-link-fill" }

search:
  enable: true
  path: /local-search.xml
  generate_path: /local-search.xml
  field: post
  content: true

banner:
  parallax: true
  width_height_ratio: 1.0

scroll_down_arrow:
  enable: true
  banner_height_limit: 80
  scroll_after_turning_page: true

scroll_top_arrow:
  enable: true

open_graph:
  enable: true
  twitter_card: summary_large_image
  twitter_id:
  twitter_site:
  google_plus:
  fb_admins:
  fb_app_id:

#---------------------------
# 页脚 (集成 OJ 链接与版本号)
#---------------------------
footer:
  content: '
    <span>MiQiu · 远星书页</span>
    <br>
    <span style="font-size: 0.85rem; opacity: 0.65;">
      Powered by
      <a href="https://hexo.io" target="_blank" rel="nofollow noopener">Hexo</a>
      &
      <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener">Fluid</a>
    </span>
    <br>
    <a href="https://www.luogu.com.cn" target="_blank" rel="noopener">Luogu</a>
    ·
    <a href="https://codeforces.com" target="_blank" rel="noopener">Codeforces</a>
    ·
    <a href="https://atcoder.jp" target="_blank" rel="noopener">AtCoder</a>
    '

  statistics:
    enable: true
    source: "leancloud"
    pv_format: "总访问量 {} 次"
    uv_format: "总访客数 {} 人"

#---------------------------
# Home Page
#---------------------------
index:
  banner_img: /img/banner_index_v2.webp
  banner_img_height: 100
  banner_mask_alpha: 0.5

  slogan:
    enable: true
    text: "愿你的旅途永远璀璨，愿你的夏日永不凋零。"
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: false
  post_sticky:
    enable: true
    icon: "iconfont icon-top"

#---------------------------
# 文章页
#---------------------------
post:
  banner_img: /img/banner_page_v2.webp
  banner_img_height: 60
  banner_mask_alpha: 0.38
  default_index_img:
  meta:
    author:
      enable: false
    date:
      enable: true
      format: "YYYY-MM-DD"
    wordcount:
      enable: true
      format: "{} 字"
    min2read:
      enable: true
      awl: 2
      wpm: 60
      format: "{} 分钟"
    views:
      enable: true
      source: "leancloud"
      format: "{} 次"
  updated:
    enable: false
    date_format: "LL a"
    relative: true
    note_class: info
  category_bar:
    enable: true
    specific: true
    placement: left
    post_order_by: "title"
    post_limit: 0
  toc:
    enable: true
    placement: right
    headingSelector: "h1,h2,h3,h4,h5,h6"
    collapseDepth: 0
  copyright:
    enable: true
    license: 'BY'
    author:
      enable: true
    post_date:
      enable: true
      format: "LL"
    update_date:
      enable: false
      format: "LL"
  prev_next:
    enable: true
  image_caption:
    enable: true
  image_zoom:
    enable: true
    img_url_replace: ['', '']
  footnote:
    enable: true
    header: ''
  math:
    enable: true
    specific: false
    engine: katex
  mermaid:
    enable: false
    specific: false
    options: { theme: 'default' }
  comments:
    enable: false
    type: valine

#---------------------------
# 评论插件
#---------------------------
valine:
  appId: azOfRMg6j8kDZzcjUS25FXKW-gzGzoHsz
  appKey: pvy1eRs2A9HXC5kAIQrRh0Eo
  path: window.location.pathname
  placeholder:
  avatar: 'retro'
  meta: ['nick', 'mail', 'link']
  requiredFields: []
  pageSize: 10
  lang: 'zh-CN'
  highlight: false
  recordIP: false
  serverURLs: ''
  emojiCDN:
  emojiMaps:
  enableQQ: false

waline:
  serverURL: ''
  path: window.location.pathname
  meta: ['nick', 'mail', 'link']
  requiredMeta: ['nick']
  lang: 'zh-CN'
  emoji: ['https://cdn.jsdelivr.net/gh/walinejs/emojis/weibo']
  dark: 'html[data-user-color-scheme="dark"]'
  wordLimit: 0
  pageSize: 10

#---------------------------
# 其他页面
#---------------------------
archive:
  banner_img: /img/banner_page_v2.webp
  banner_img_height: 60
  banner_mask_alpha: 0.42

category:
  enable: true
  banner_img: /img/banner_page_v2.webp
  banner_img_height: 60
  banner_mask_alpha: 0.42
  order_by: "-length"
  collapse_depth: 0
  post_order_by: "-date"
  post_limit: 10

tag:
  enable: true
  banner_img: /img/banner_page_v2.webp
  banner_img_height: 60
  banner_mask_alpha: 0.42
  tagcloud:
    min_font: 15
    max_font: 30
    unit: px
    start_color: "#BBBBEE"
    end_color: "#337ab7"

about:
  enable: true
  banner_img: /img/banner_about_v2.webp
  banner_img_height: 80
  banner_mask_alpha: 0.28
  avatar: /img/avatar.jpg
  name: "MiQiu"
  intro: "原来期待比踽凉更难，碎了时间"
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/RainCnya/", tip: "GitHub" }

page:
  banner_img: /img/banner_page_v2.webp
  banner_img_height: 60
  banner_mask_alpha: 0.42

page404:
  enable: true
  banner_img: /img/banner_404.jpg
  banner_img_height: 72
  banner_mask_alpha: 0.08
  redirect_delay: 5000

